spring.application.name=Backend
llm.api.key=${GROQ_API_KEY}
llm.api.url=https://api.groq.com/openai/v1

# Spring AI OpenAI configuration mapped to Groq properties
spring.ai.openai.api-key=${llm.api.key}
spring.ai.openai.base-url=${llm.api.url}
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Database Configuration (SQLite)
spring.datasource.url=jdbc:sqlite:skillsort.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always

# Max file upload size configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB